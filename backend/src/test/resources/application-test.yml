# 测试环境配置
# 使用 H2 内存数据库替代 MySQL

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  h2:
    console:
      enabled: false

  # 使用 schema-test.sql 初始化数据库（测试环境）
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
      data-locations: classpath:data-test.sql
      encoding: utf-8

  # 嵌入式 Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0

# JWT配置 - 测试用固定密钥
jwt:
  secret: test-jwt-secret-key-for-unit-testing-purpose-only-minimum-256-bits-required
  expiration: 604800000
  header: Authorization
  prefix: Bearer

# 微信小程序配置 - 测试用
wx:
  miniapp:
    appid: test-appid
    secret: test-secret
    msgDataFormat: JSON
    tenantId: 10001

# 文件上传配置
file:
  upload:
    path: /tmp/test-uploads
    base-url: http://localhost:8080/api/uploads

# 日志配置
logging:
  level:
    com.aicoupledish: debug
    org.springframework: warn

# 关闭 Knife4j
knife4j:
  enable: false
