# 情侣私密菜单 - 开发环境 Docker Compose
# 包含: MySQL + Redis + Backend + Nginx
# 使用: docker-compose up -d

version: '3.8'

services:
  #==========================================
  # 公共组件 - MySQL
  #==========================================
  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME:-ai-couple-dish}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_couple_dish}
      MYSQL_USER: ${MYSQL_USER:-aicoupledish}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev_password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=128M
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  #==========================================
  # 公共组件 - Redis
  #==========================================
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-ai-couple-dish}-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  #==========================================
  # 业务组件 - 后端服务
  #==========================================
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-ai-couple-dish}-backend
    restart: unless-stopped
    environment:
      # 数据库配置（连接到本地MySQL容器）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ai_couple_dish}
      DB_USERNAME: ${MYSQL_USER:-aicoupledish}
      DB_PASSWORD: ${MYSQL_PASSWORD:-dev_password}
      # Redis配置（连接到本地Redis容器）
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_pass}
      REDIS_DATABASE: 0
      # JWT配置
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_key_32_chars_min}
      JWT_EXPIRATION: 604800000
      # 微信小程序配置
      WX_MINIAPP_APPID: ${WX_APPID:-dev_appid}
      WX_MINIAPP_SECRET: ${WX_SECRET:-dev_secret}
      # Java配置
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dev-network

  #==========================================
  # Nginx反向代理（可选）
  #==========================================
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-ai-couple-dish}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - dev-network

#==========================================
# 存储卷
#==========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  nginx_logs:
    driver: local

#==========================================
# 网络
#==========================================
networks:
  dev-network:
    driver: bridge
