# 情侣私密菜单 - 轻量级部署配置 (2核4G服务器)
# 优化说明：
#   - MySQL: 限制 buffer pool 为 256MB，总内存约 400MB
#   - Redis: 限制 maxmemory 128MB
#   - Backend: JVM 堆内存 512MB
#   - Nginx: Alpine 极轻量
# 使用: docker-compose up -d

version: '3.8'

services:
  #==========================================
  # MySQL - 轻量优化配置
  #==========================================
  mysql:
    image: mysql:8.0
    container_name: ai-couple-dish-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_couple_dish}
      MYSQL_USER: ${MYSQL_USER:-aicoupledish}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-user_password_change_me}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      # 轻量优化参数
      - --innodb_buffer_pool_size=256M
      - --innodb_log_buffer_size=8M
      - --max_connections=100
      - --table_open_cache=64
      - --thread_cache_size=8
      - --key_buffer_size=16M
      - --tmp_table_size=32M
      - --max_heap_table_size=32M
      - --query_cache_type=0
      - --query_cache_size=0
      - --performance_schema=OFF
      - --skip-innodb-buffer-pool-stats
      - --skip-innodb-buffer-pool-dump
    ports:
      - "127.0.0.1:3306:3306"  # 仅本地访问
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password_change_me}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  #==========================================
  # Redis - 轻量配置
  #==========================================
  redis:
    image: redis:7-alpine
    container_name: ai-couple-dish-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_change_me}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 64M
    networks:
      - app-network

  #==========================================
  # 后端服务 - 内存优化配置
  #==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-couple-dish-backend:latest
    container_name: ai-couple-dish-backend
    restart: unless-stopped
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ai_couple_dish}
      DB_USERNAME: ${MYSQL_USER:-aicoupledish}
      DB_PASSWORD: ${MYSQL_PASSWORD:-user_password_change_me}
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_change_me}
      REDIS_DATABASE: 0
      # JWT配置 (生产环境必须修改!)
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string_at_least_32_chars}
      JWT_EXPIRATION: 604800000
      # JVM 优化参数 (2核4G适配)
      JAVA_OPTS: >-
        -Xms384m
        -Xmx512m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseStringDeduplication
        -XX:+AlwaysPreTouch
        -XX:MaxMetaspaceSize=128m
        -XX:CompressedClassSpaceSize=64m
        -Xss256k
        -XX:InitiatingHeapOccupancyPercent=45
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "127.0.0.1:8080:8080"  # 仅本地访问，通过Nginx代理
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
    networks:
      - app-network

  #==========================================
  # Nginx 反向代理 + H5前端托管
  #==========================================
  nginx:
    image: nginx:alpine
    container_name: ai-couple-dish-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # H5前端静态文件
      - ./frontend-h5/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    networks:
      - app-network

#==========================================
# 存储卷
#==========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  nginx_logs:
    driver: local

#==========================================
# 网络
#==========================================
networks:
  app-network:
    driver: bridge
