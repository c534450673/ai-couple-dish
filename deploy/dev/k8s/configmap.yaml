# 开发环境 - ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-couple-dish-config
  namespace: ai-couple-dish-dev
data:
  # 数据库配置（本地Docker MySQL）
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "ai_couple_dish"
  DB_USERNAME: "aicoupledish"

  # Redis配置（本地Docker Redis）
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # 应用配置
  SPRING_PROFILES_ACTIVE: "dev"
  SERVER_PORT: "8080"

  # 文件上传
  FILE_UPLOAD_PATH: "/app/uploads"
  FILE_BASE_URL: "http://localhost/api/uploads"

  # 时区
  TZ: "Asia/Shanghai"
---
# 开发环境 - Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: ai-couple-dish-dev
  labels:
    name: ai-couple-dish-dev
    env: development
