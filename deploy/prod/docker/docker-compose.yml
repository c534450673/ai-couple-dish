# 情侣私密菜单 - 生产环境 Docker Compose
# 包含: Backend + Nginx（无嵌入式MySQL/Redis，使用外部服务）
# 使用: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  #==========================================
  # 业务组件 - 后端服务（无嵌入式数据库）
  #==========================================
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-ai-couple-dish}-backend
    restart: unless-stopped
    environment:
      # 数据库配置（外部云数据库）
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-ai_couple_dish}
      DB_USERNAME: ${DB_USERNAME:-aicoupledish}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis配置（外部云Redis）
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 604800000
      # 微信小程序配置
      WX_MINIAPP_APPID: ${WX_APPID}
      WX_MINIAPP_SECRET: ${WX_SECRET}
      # Java配置（生产环境更高配置）
      JAVA_OPTS: "-Xms512m -Xmx2048m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError"
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - prod-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  #==========================================
  # Nginx反向代理（必须有）
  #==========================================
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-ai-couple-dish}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

#==========================================
# 存储卷
#==========================================
volumes:
  uploads_data:
    driver: local
  logs_data:
    driver: local
  nginx_logs:
    driver: local

#==========================================
# 网络
#==========================================
networks:
  prod-network:
    driver: bridge
