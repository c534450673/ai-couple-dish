# 生产环境配置 - 针对小型服务器优化 (2核4G)
# 使用: docker-compose -f docker-compose.yml up -d (prod环境)

server:
  tomcat:
    threads:
      max: 100
      min-spare: 10
    accept-count: 50
    max-connections: 200

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:ai_couple_dish}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${DB_USERNAME:aicoupledish}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 3
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 5000
    lettuce:
      pool:
        max-active: 6
        max-idle: 4
        min-idle: 2
        max-wait: 3000ms

# 生产环境日志级别
logging:
  level:
    com.aicoupledish: info
    org.springframework: warn
    org.mybatis: warn
  file:
    name: /app/logs/application.log
    max-size: 100MB
    max-history: 30

# 生产环境完整安全特性
management:
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

# MyBatis Plus生产优化
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true

# 生产环境禁用Swagger/Knife4j
knife4j:
  enable: false
  production: true
