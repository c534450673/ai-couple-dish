{{/* Secret Template */}}
apiVersion: v1
kind: Secret
metadata:
  name: ai-couple-dish-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.secret.dbPassword | default (randAlphaNum 16) }}
  REDIS_PASSWORD: {{ .Values.secret.redisPassword | default (randAlphaNum 16) }}
  MYSQL_ROOT_PASSWORD: {{ .Values.secret.mysqlRootPassword | default (randAlphaNum 16) }}
  JWT_SECRET: {{ .Values.secret.jwtSecret }}
  WX_MINIAPP_APPID: {{ .Values.secret.wxAppid }}
  WX_MINIAPP_SECRET: {{ .Values.secret.wxSecret }}
