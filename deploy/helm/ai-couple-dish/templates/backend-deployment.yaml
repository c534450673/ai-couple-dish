{{/* Backend Deployment Template */}}
{{- if .Values.backend.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
    version: {{ .Chart.Version }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        version: {{ .Chart.Version }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 8080
              name: backend
          env:
            - name: DB_HOST
              value: {{ .Values.externalDatabase.enabled | ternary .Values.externalDatabase.host "mysql" }}
            - name: DB_PORT
              value: {{ .Values.externalDatabase.enabled | ternary (quote .Values.externalDatabase.port) "3306" }}
            - name: DB_NAME
              value: {{ .Values.externalDatabase.enabled | ternary .Values.externalDatabase.database "ai_couple_dish" }}
            - name: DB_USERNAME
              value: {{ .Values.externalDatabase.enabled | ternary .Values.externalDatabase.username "aicoupledish" }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-couple-dish-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              value: {{ .Values.externalRedis.enabled | ternary .Values.externalRedis.host "redis" }}
            - name: REDIS_PORT
              value: {{ .Values.externalRedis.enabled | ternary (quote .Values.externalRedis.port) "6379" }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-couple-dish-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-couple-dish-secrets
                  key: JWT_SECRET
            - name: WX_MINIAPP_APPID
              valueFrom:
                secretKeyRef:
                  name: ai-couple-dish-secrets
                  key: WX_MINIAPP_APPID
            - name: WX_MINIAPP_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-couple-dish-secrets
                  key: WX_MINIAPP_SECRET
            - name: JAVA_OPTS
              value: {{ .Values.backend.javaOpts }}
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: TZ
              value: {{ .Values.timezone }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: uploads
          {{- if eq .Values.storage.type "persistentVolumeClaim" }}
          persistentVolumeClaim:
            claimName: {{ .Values.storage.pvc.name }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: backend
  selector:
    app: backend
{{- end }}
