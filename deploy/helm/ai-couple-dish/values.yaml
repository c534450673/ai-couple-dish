# Default values for ai-couple-dish

# 命名空间
namespace: ai-couple-dish

# 全局镜像配置
image:
  backend:
    repository: registry.cn-hangzhou.aliyuncs.com/ai-couple-dish/backend
    tag: latest
    pullPolicy: IfNotPresent

  mysql:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent

  redis:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  nginx:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent

# 数据库配置
mysql:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  configuration:
    max_connections: "1000"
    innodb_buffer_pool_size: "256M"
  # 初始化SQL脚本
  initScript: |
    CREATE DATABASE IF NOT EXISTS ai_couple_dish DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# Redis配置
redis:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  configuration: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# 后端服务配置
backend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  image:
    backend:
      repository: registry.cn-hangzhou.aliyuncs.com/ai-couple-dish/backend
      tag: latest
  javaOpts: "-Xms512m -Xmx1024m -XX:+UseG1GC"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  livenessProbe:
    path: /api/actuator/health
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    path: /api/actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10

# Nginx配置
nginx:
  enabled: true
  replicaCount: 1
  service:
    type: LoadBalancer
    httpPort: 80
    httpsPort: 443
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# 外部数据库配置（可选）
externalDatabase:
  enabled: false
  host: ""
  port: 3306
  database: ""
  username: ""
  # 密码需通过secret指定
  existingSecret: ""

# 外部Redis配置（可选）
externalRedis:
  enabled: false
  host: ""
  port: 6379
  # 密码需通过secret指定
  existingSecret: ""

# Secret配置（必须设置）
secret:
  # JWT密钥（必须修改）
  jwtSecret: "CHANGE_THIS_TO_A_RANDOM_SECRET_KEY_MIN_32_CHARS"
  # 微信小程序配置（必须修改）
  wxAppid: "your-wx-appid"
  wxSecret: "your-wx-secret"
  # 数据库密码（如果不使用内置MySQL）
  dbPassword: ""
  redisPassword: ""
  mysqlRootPassword: ""

# 域名配置
ingress:
  enabled: true
  className: "nginx"
  host: "api.aicoupledish.com"
  tls:
    enabled: true
    # 证书Secret名称（需提前创建或使用cert-manager自动签发）
    secretName: "ai-couple-dish-tls"

# 文件存储配置
storage:
  type: "emptyDir"  # emptyDir / persistentVolumeClaim
  # 如果使用PVC
  pvc:
    name: "uploads-pvc"
    size: "10Gi"
    storageClass: ""

# 日志配置
logging:
  level: "INFO"
  format: "json"

# 时区配置
timezone: "Asia/Shanghai"
