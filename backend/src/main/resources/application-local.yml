# 本地开发环境配置
# 使用: 直接运行后端JAR包或IDE启动
# 注意: 所有敏感配置通过环境变量设置，不要在此文件中硬编码

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_couple_dish}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 3
      maximum-pool-size: 10

  sql:
    init:
      mode: never

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}

# 本地开发日志级别
logging:
  level:
    com.aicoupledish: debug
    org.springframework: debug
    org.mybatis: debug

# 开启健康检查详情
management:
  endpoint:
    health:
      show-details: always
