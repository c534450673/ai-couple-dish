# Production Environment - Secrets Template
# ============================================
# ⚠️  CRITICAL: NEVER COMMIT ACTUAL SECRETS TO VERSION CONTROL
# ============================================
#
# For production, secrets MUST be managed externally:
#
# Option 1: kubectl with external secrets
#   Create secrets via CI/CD pipeline using sealed-secrets or external-secrets
#
# Option 2: Vault integration
#   Use external-secrets operator to sync from HashiCorp Vault
#
# Option 3: Kubernetes secrets via CI/CD
#   Inject secrets during deployment using CI/CD variables
#
# Required secret keys for production:
#   - DB_PASSWORD      : Database password (required, strong password)
#   - REDIS_PASSWORD   : Redis password (required if Redis auth enabled)
#   - JWT_SECRET       : JWT signing key (required, minimum 64 characters for HS512)
#   - WX_APPID         : WeChat MiniApp AppID (required)
#   - WX_SECRET        : WeChat MiniApp Secret (required)
#
# Example kubectl command for initial setup:
#   kubectl create secret generic ai-couple-dish-secrets \
#     --from-literal=DB_PASSWORD='$(DB_PASSWORD)' \
#     --from-literal=REDIS_PASSWORD='$(REDIS_PASSWORD)' \
#     --from-literal=JWT_SECRET='$(JWT_SECRET)' \
#     --from-literal=WX_APPID='$(WX_APPID)' \
#     --from-literal=WX_SECRET='$(WX_SECRET)' \
#     -n ai-couple-dish-prod
#
# IMPORTANT: Generate secure JWT secret with:
#   openssl rand -base64 64
#
apiVersion: v1
kind: Secret
metadata:
  name: ai-couple-dish-secrets
  namespace: ai-couple-dish-prod
type: Opaque
stringData:
  # Database password
  # ⚠️  Replace with actual password before deployment
  DB_PASSWORD: "REPLACE_WITH_PROD_DB_PASSWORD"

  # Redis password
  # ⚠️  Replace with actual password before deployment
  REDIS_PASSWORD: "REPLACE_WITH_PROD_REDIS_PASSWORD"

  # JWT secret (minimum 64 characters for HS512 algorithm)
  # ⚠️  Generate with: openssl rand -base64 64
  JWT_SECRET: "REPLACE_WITH_PROD_JWT_SECRET_AT_LEAST_64_CHARS"

  # WeChat MiniApp AppID
  # ⚠️  Replace with production AppID
  WX_APPID: "REPLACE_WITH_PROD_WX_APPID"

  # WeChat MiniApp Secret
  # ⚠️  Replace with production Secret
  WX_SECRET: "REPLACE_WITH_PROD_WX_SECRET"

---
# TLS Certificate Secret (optional if using cert-manager for automatic TLS)
# If you already have certificates, use the commented section below:
