server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-couple-dish-test

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_couple_dish_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root

  redis:
    host: localhost
    port: 6379
    password:
    database: 1
    timeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql
      data-locations: classpath:test-data.sql

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aicoupledish.dao.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: aiCoupleDishSecretKey2024VeryLongAndSecureForTest
  expiration: 604800000
  header: Authorization
  prefix: Bearer

# 微信小程序配置
wx:
  miniapp:
    appid: test-appid
    secret: test-secret
    msgDataFormat: JSON
    tenantId: 10001

# 文件上传配置
file:
  upload:
    path: /tmp/ai-couple-dish-test/uploads
    base-url: http://localhost:8080/api/uploads

# 日志配置
logging:
  level:
    com.aicoupledish: debug
    org.springframework: info
