<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪食蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #4ecca3;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(78, 204, 163, 0.1);
            padding: 10px 25px;
            border-radius: 10px;
            border: 2px solid #4ecca3;
        }

        .score-item span {
            color: #fff;
            font-size: 1rem;
        }

        .score-item .value {
            color: #4ecca3;
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 10px;
        }

        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            background: #0f0f23;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
        }

        .controls {
            margin-top: 20px;
            color: #888;
        }

        .controls p {
            margin: 5px 0;
        }

        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background: #3db892;
            transform: scale(1.05);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            border: 3px solid #e94560;
            display: none;
            z-index: 100;
        }

        .game-over h2 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
        }

        .mobile-btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 5px 0;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(78, 204, 163, 0.2);
            border: 2px solid #4ecca3;
            border-radius: 10px;
            color: #4ecca3;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            background: #4ecca3;
            color: #1a1a2e;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .score-board {
                gap: 20px;
            }

            .score-item {
                padding: 8px 15px;
            }

            .mobile-controls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪食蛇</h1>

        <div class="score-board">
            <div class="score-item">
                <span>当前分数:</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="score-item">
                <span>最高分数:</span>
                <span class="value" id="highScore">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <p>使用 <strong>↑ ↓ ← →</strong> 或 <strong>W A S D</strong> 控制方向</p>
            <p>按 <strong>空格键</strong> 暂停/继续</p>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>

        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <div class="mobile-btn-row">
                <button class="mobile-btn" id="upBtn">↑</button>
            </div>
            <div class="mobile-btn-row">
                <button class="mobile-btn" id="leftBtn">←</button>
                <button class="mobile-btn" id="downBtn">↓</button>
                <button class="mobile-btn" id="rightBtn">→</button>
            </div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>你的分数: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            gridSize: 20,        // 格子大小
            gameSpeed: 120,      // 游戏速度(毫秒)
            canvasSize: 400      // 画布大小
        };

        // 游戏状态
        const game = {
            canvas: null,
            ctx: null,
            snake: [],
            food: null,
            direction: 'right',
            nextDirection: 'right',
            score: 0,
            highScore: parseInt(localStorage.getItem('snakeHighScore')) || 0,
            gameLoop: null,
            isRunning: false,
            isPaused: false
        };

        // 初始化游戏
        function init() {
            game.canvas = document.getElementById('gameCanvas');
            game.ctx = game.canvas.getContext('2d');

            // 显示最高分
            document.getElementById('highScore').textContent = game.highScore;

            // 绑定事件
            bindEvents();

            // 绘制初始画面
            drawGrid();
        }

        // 绑定事件
        function bindEvents() {
            // 键盘控制
            document.addEventListener('keydown', handleKeydown);

            // 开始按钮
            document.getElementById('startBtn').addEventListener('click', startGame);

            // 重新开始按钮
            document.getElementById('restartBtn').addEventListener('click', restartGame);

            // 移动端控制
            document.getElementById('upBtn').addEventListener('click', () => changeDirection('up'));
            document.getElementById('downBtn').addEventListener('click', () => changeDirection('down'));
            document.getElementById('leftBtn').addEventListener('click', () => changeDirection('left'));
            document.getElementById('rightBtn').addEventListener('click', () => changeDirection('right'));
        }

        // 键盘事件处理
        function handleKeydown(e) {
            const keyMap = {
                'ArrowUp': 'up', 'KeyW': 'up',
                'ArrowDown': 'down', 'KeyS': 'down',
                'ArrowLeft': 'left', 'KeyA': 'left',
                'ArrowRight': 'right', 'KeyD': 'right'
            };

            if (keyMap[e.code]) {
                e.preventDefault();
                changeDirection(keyMap[e.code]);
            }

            // 空格暂停
            if (e.code === 'Space' && game.isRunning) {
                e.preventDefault();
                togglePause();
            }
        }

        // 改变方向
        function changeDirection(newDirection) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };

            // 不能反向
            if (opposites[newDirection] !== game.direction) {
                game.nextDirection = newDirection;
            }
        }

        // 开始游戏
        function startGame() {
            if (game.isRunning) return;

            resetGame();
            game.isRunning = true;
            document.getElementById('startBtn').textContent = '游戏中...';
            document.getElementById('startBtn').disabled = true;

            game.gameLoop = setInterval(gameStep, CONFIG.gameSpeed);
        }

        // 重置游戏
        function resetGame() {
            // 初始化蛇
            const startX = Math.floor(CONFIG.canvasSize / CONFIG.gridSize / 2);
            const startY = Math.floor(CONFIG.canvasSize / CONFIG.gridSize / 2);

            game.snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];

            game.direction = 'right';
            game.nextDirection = 'right';
            game.score = 0;
            game.isPaused = false;

            updateScore();
            spawnFood();
        }

        // 游戏主循环
        function gameStep() {
            if (game.isPaused) return;

            // 更新方向
            game.direction = game.nextDirection;

            // 移动蛇
            const head = { ...game.snake[0] };

            switch (game.direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // 检测碰撞
            if (checkCollision(head)) {
                gameOver();
                return;
            }

            // 添加新头部
            game.snake.unshift(head);

            // 检测是否吃到食物
            if (head.x === game.food.x && head.y === game.food.y) {
                game.score += 10;
                updateScore();
                spawnFood();
            } else {
                game.snake.pop();
            }

            // 绘制
            draw();
        }

        // 检测碰撞
        function checkCollision(head) {
            const gridCount = CONFIG.canvasSize / CONFIG.gridSize;

            // 墙壁碰撞
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                return true;
            }

            // 自身碰撞
            for (let i = 0; i < game.snake.length; i++) {
                if (game.snake[i].x === head.x && game.snake[i].y === head.y) {
                    return true;
                }
            }

            return false;
        }

        // 生成食物
        function spawnFood() {
            const gridCount = CONFIG.canvasSize / CONFIG.gridSize;
            let newFood;

            do {
                newFood = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            } while (game.snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));

            game.food = newFood;
        }

        // 绘制
        function draw() {
            const ctx = game.ctx;
            const gridSize = CONFIG.gridSize;

            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, CONFIG.canvasSize, CONFIG.canvasSize);

            // 绘制网格
            drawGrid();

            // 绘制蛇
            game.snake.forEach((segment, index) => {
                const isHead = index === 0;

                // 渐变色
                const hue = 160 - (index * 2);
                ctx.fillStyle = isHead ? '#4ecca3' : `hsl(${hue}, 70%, 50%)`;

                // 绘制圆角方块
                const padding = 2;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + padding,
                    segment.y * gridSize + padding,
                    gridSize - padding * 2,
                    gridSize - padding * 2,
                    4
                );
                ctx.fill();

                // 蛇头眼睛
                if (isHead) {
                    ctx.fillStyle = '#1a1a2e';
                    const eyeSize = 3;
                    const eyeOffset = 5;

                    if (game.direction === 'right') {
                        ctx.fillRect(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + 6, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - 9, eyeSize, eyeSize);
                    } else if (game.direction === 'left') {
                        ctx.fillRect(segment.x * gridSize + eyeOffset - eyeSize, segment.y * gridSize + 6, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + eyeOffset - eyeSize, segment.y * gridSize + gridSize - 9, eyeSize, eyeSize);
                    } else if (game.direction === 'up') {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + eyeOffset - eyeSize, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + gridSize - 9, segment.y * gridSize + eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + gridSize - eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + gridSize - 9, segment.y * gridSize + gridSize - eyeOffset, eyeSize, eyeSize);
                    }
                }
            });

            // 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(
                game.food.x * gridSize + gridSize / 2,
                game.food.y * gridSize + gridSize / 2,
                gridSize / 2 - 3,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 食物光晕
            ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
            ctx.beginPath();
            ctx.arc(
                game.food.x * gridSize + gridSize / 2,
                game.food.y * gridSize + gridSize / 2,
                gridSize / 2 + 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        // 绘制网格
        function drawGrid() {
            const ctx = game.ctx;
            const gridSize = CONFIG.gridSize;
            const gridCount = CONFIG.canvasSize / gridSize;

            ctx.strokeStyle = 'rgba(78, 204, 163, 0.1)';
            ctx.lineWidth = 0.5;

            for (let i = 0; i <= gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, CONFIG.canvasSize);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(CONFIG.canvasSize, i * gridSize);
                ctx.stroke();
            }
        }

        // 更新分数
        function updateScore() {
            document.getElementById('score').textContent = game.score;

            if (game.score > game.highScore) {
                game.highScore = game.score;
                document.getElementById('highScore').textContent = game.highScore;
                localStorage.setItem('snakeHighScore', game.highScore);
            }
        }

        // 暂停/继续
        function togglePause() {
            game.isPaused = !game.isPaused;
            document.getElementById('startBtn').textContent = game.isPaused ? '已暂停' : '游戏中...';
        }

        // 游戏结束
        function gameOver() {
            clearInterval(game.gameLoop);
            game.isRunning = false;

            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('startBtn').textContent = '开始游戏';
            document.getElementById('startBtn').disabled = false;
        }

        // 重新开始
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
